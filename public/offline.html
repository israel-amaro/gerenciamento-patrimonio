<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>EquipControl Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fa;
        color: #111827;
        font-family: Arial, sans-serif;
      }

      .card {
        max-width: 420px;
        margin: 24px;
        padding: 28px;
        border: 1px solid #d1d5db;
        border-radius: 18px;
        background: white;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #6b7280;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sem conexão</h1>
      <p>O EquipControl está sem internet no momento. Assim que a conexão voltar, recarregue a página para continuar.</p>
    </div>
  </body>
</html>
